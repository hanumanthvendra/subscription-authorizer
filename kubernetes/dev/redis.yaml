# DEV ONLY — ephemeral Redis for local/kind testing. Production uses HA + noeviction.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: auth
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory-policy", "noeviction"]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: auth }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
