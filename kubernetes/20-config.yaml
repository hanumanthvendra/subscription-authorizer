apiVersion: v1
kind: ConfigMap
metadata:
  name: subscription-authorizer-config
  namespace: auth
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "8080"
  RESERVATION_TTL_SECONDS: "600"
  OVERAGE_ALLOWANCE: "0"
  QUOTA_PERIOD_GRACE_SECONDS: "86400"
  POINTS_PER_1K_TOKENS: "1"
  SUBSCRIPTION_CACHE_TTL_SECONDS: "45"
  JWT_ISSUER: "https://issuer.local/"
  JWT_AUDIENCE: "api://main-app"
  JWT_ALGS: "RS256"
  WORKERS_ENABLED: "true"
  EXPIRY_SWEEP_INTERVAL_SECONDS: "60"
  RECONCILE_INTERVAL_SECONDS: "300"
  RECONCILE_REPAIR: "false"
---
# NOTE: real secrets come from a SealedSecret / external secret store in production.
# For local kind testing this is created imperatively (see README / verify step):
#   kubectl -n auth create secret generic subscription-authorizer-secret \
#     --from-literal=DATABASE_URL=... --from-literal=REDIS_URL=... \
#     --from-literal=INTERNAL_SERVICE_TOKEN_SECRET=... --from-literal=JWKS_JSON=...
apiVersion: v1
kind: Secret
metadata:
  name: subscription-authorizer-secret
  namespace: auth
type: Opaque
stringData:
  DATABASE_URL: "postgres://authorizer:authorizer@postgres:5432/authorizer"
  REDIS_URL: "redis://redis:6379"
  INTERNAL_SERVICE_TOKEN_SECRET: "REPLACE_ME"
  JWKS_JSON: "{}"
