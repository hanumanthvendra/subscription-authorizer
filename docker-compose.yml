services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authorizer
      POSTGRES_PASSWORD: authorizer
      POSTGRES_DB: authorizer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authorizer -d authorizer"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    # dedicated quota store: never evict quota keys
    command: ["redis-server", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  authorizer:
    build: .
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://authorizer:authorizer@postgres:5432/authorizer
      REDIS_URL: redis://redis:6379
      INTERNAL_SERVICE_TOKEN_SECRET: local-dev-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - authorizer
