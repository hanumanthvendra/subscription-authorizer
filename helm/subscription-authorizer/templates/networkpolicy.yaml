{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sa.fullname" . }}-default-deny
  labels: {{- include "sa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "sa.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sa.fullname" . }}-allow
  labels: {{- include "sa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "sa.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.appNamespace }}
      ports:
        - { protocol: TCP, port: 8080 }
{{- end }}
