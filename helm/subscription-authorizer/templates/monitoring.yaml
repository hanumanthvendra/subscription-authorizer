{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sa.fullname" . }}
  labels:
    {{- include "sa.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.serviceMonitor.releaseLabel }}
spec:
  selector:
    matchLabels: {{- include "sa.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames: ["{{ .Release.Namespace }}"]
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
{{- if .Values.monitoring.prometheusRule.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "sa.fullname" . }}
  labels:
    {{- include "sa.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.prometheusRule.releaseLabel }}
spec:
{{ .Files.Get "files/alert-rules.yaml" | indent 2 }}
{{- end }}
